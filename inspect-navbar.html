<!DOCTYPE html>
<html>
<head>
    <title>Navbar Position Inspector</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .result {
            background: #252526;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 3px solid #007acc;
        }
        .culprit {
            border-left-color: #f48771;
        }
        h2 {
            color: #4ec9b0;
        }
        .property {
            margin: 5px 0;
        }
        .label {
            color: #9cdcfe;
        }
        .value {
            color: #ce9178;
        }
    </style>
</head>
<body>
    <h1>Navbar Position Inspector</h1>
    <div id="results"></div>
    
    <script>
        function inspectNavbar() {
            const results = document.getElementById('results');
            
            // Try to find the header/navbar element
            const header = document.querySelector('header');
            
            if (!header) {
                results.innerHTML = '<div class="result">❌ No header element found</div>';
                return;
            }
            
            const computedStyle = window.getComputedStyle(header);
            const rect = header.getBoundingClientRect();
            
            let html = '<div class="result">';
            html += '<h2>🎯 Header Element Found</h2>';
            html += `<div class="property"><span class="label">Tag:</span> <span class="value">&lt;${header.tagName.toLowerCase()}&gt;</span></div>`;
            html += `<div class="property"><span class="label">Classes:</span> <span class="value">${header.className}</span></div>`;
            html += '<h3>Computed Position Properties:</h3>';
            html += `<div class="property"><span class="label">position:</span> <span class="value">${computedStyle.position}</span></div>`;
            html += `<div class="property"><span class="label">top:</span> <span class="value">${computedStyle.top}</span></div>`;
            html += `<div class="property"><span class="label">left:</span> <span class="value">${computedStyle.left}</span></div>`;
            html += `<div class="property"><span class="label">right:</span> <span class="value">${computedStyle.right}</span></div>`;
            html += `<div class="property"><span class="label">z-index:</span> <span class="value">${computedStyle.zIndex}</span></div>`;
            html += '<h3>Bounding Rect:</h3>';
            html += `<div class="property"><span class="label">top:</span> <span class="value">${rect.top}px</span></div>`;
            html += `<div class="property"><span class="label">left:</span> <span class="value">${rect.left}px</span></div>`;
            html += '</div>';
            
            // Check all parent elements for problematic properties
            let parent = header.parentElement;
            let level = 1;
            const culprits = [];
            
            while (parent && parent !== document.documentElement) {
                const parentStyle = window.getComputedStyle(parent);
                const hasTransform = parentStyle.transform !== 'none';
                const hasOverflow = parentStyle.overflow !== 'visible' || 
                                   parentStyle.overflowX !== 'visible' || 
                                   parentStyle.overflowY !== 'visible';
                const hasWillChange = parentStyle.willChange !== 'auto';
                const hasFilter = parentStyle.filter !== 'none';
                const hasPerspective = parentStyle.perspective !== 'none';
                
                const isCulprit = hasTransform || hasOverflow || hasWillChange || hasFilter || hasPerspective;
                
                if (isCulprit) {
                    culprits.push({
                        element: parent,
                        level,
                        tag: parent.tagName.toLowerCase(),
                        classes: parent.className,
                        id: parent.id,
                        transform: parentStyle.transform,
                        overflow: parentStyle.overflow,
                        overflowX: parentStyle.overflowX,
                        overflowY: parentStyle.overflowY,
                        willChange: parentStyle.willChange,
                        filter: parentStyle.filter,
                        perspective: parentStyle.perspective,
                        position: parentStyle.position
                    });
                }
                
                parent = parent.parentElement;
                level++;
            }
            
            if (culprits.length > 0) {
                html += '<div class="result culprit">';
                html += '<h2>⚠️ Culprits Found!</h2>';
                html += '<p>The following parent elements create a new stacking context or clip the fixed element:</p>';
                
                culprits.forEach((culprit, index) => {
                    html += `<h3>Parent Level ${culprit.level}: &lt;${culprit.tag}&gt;</h3>`;
                    if (culprit.id) html += `<div class="property"><span class="label">ID:</span> <span class="value">${culprit.id}</span></div>`;
                    if (culprit.classes) html += `<div class="property"><span class="label">Classes:</span> <span class="value">${culprit.classes}</span></div>`;
                    html += `<div class="property"><span class="label">position:</span> <span class="value">${culprit.position}</span></div>`;
                    if (culprit.transform !== 'none') {
                        html += `<div class="property">🔴 <span class="label">transform:</span> <span class="value">${culprit.transform}</span></div>`;
                    }
                    if (culprit.overflow !== 'visible') {
                        html += `<div class="property">🔴 <span class="label">overflow:</span> <span class="value">${culprit.overflow}</span></div>`;
                    }
                    if (culprit.overflowX !== 'visible') {
                        html += `<div class="property">🔴 <span class="label">overflow-x:</span> <span class="value">${culprit.overflowX}</span></div>`;
                    }
                    if (culprit.overflowY !== 'visible') {
                        html += `<div class="property">🔴 <span class="label">overflow-y:</span> <span class="value">${culprit.overflowY}</span></div>`;
                    }
                    if (culprit.willChange !== 'auto') {
                        html += `<div class="property">🔴 <span class="label">will-change:</span> <span class="value">${culprit.willChange}</span></div>`;
                    }
                    if (culprit.filter !== 'none') {
                        html += `<div class="property">🔴 <span class="label">filter:</span> <span class="value">${culprit.filter}</span></div>`;
                    }
                    if (culprit.perspective !== 'none') {
                        html += `<div class="property">🔴 <span class="label">perspective:</span> <span class="value">${culprit.perspective}</span></div>`;
                    }
                    html += '<br>';
                });
                
                html += '</div>';
                
                html += '<div class="result">';
                html += '<h2>💡 Suggested Fixes</h2>';
                culprits.forEach((culprit, index) => {
                    html += `<h3>For &lt;${culprit.tag}&gt;${culprit.id ? '#' + culprit.id : ''}${culprit.classes ? '.' + culprit.classes.split(' ').join('.') : ''}:</h3>`;
                    if (culprit.transform !== 'none') {
                        html += '<p>• Remove <code>transform</code> property, or move the fixed header outside this element</p>';
                    }
                    if (culprit.overflow !== 'visible' || culprit.overflowX !== 'visible' || culprit.overflowY !== 'visible') {
                        html += '<p>• Change <code>overflow</code> to <code>visible</code>, or move the fixed header outside this element</p>';
                    }
                    if (culprit.willChange !== 'auto') {
                        html += '<p>• Remove <code>will-change</code> property, or move the fixed header outside this element</p>';
                    }
                    if (culprit.filter !== 'none') {
                        html += '<p>• Remove <code>filter</code> property, or move the fixed header outside this element</p>';
                    }
                    if (culprit.perspective !== 'none') {
                        html += '<p>• Remove <code>perspective</code> property, or move the fixed header outside this element</p>';
                    }
                });
                html += '</div>';
            } else {
                html += '<div class="result">';
                html += '<h2>✅ No Culprits Found</h2>';
                html += '<p>No parent elements with transform, overflow, or other properties that would affect fixed positioning.</p>';
                html += '</div>';
            }
            
            results.innerHTML = html;
            
            // Log to console for easy copying
            console.log('=== NAVBAR INSPECTION RESULTS ===');
            console.log('Header element:', header);
            console.log('Computed position:', computedStyle.position);
            console.log('Bounding rect:', rect);
            console.log('Culprits:', culprits);
        }
        
        // Run inspection when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inspectNavbar);
        } else {
            inspectNavbar();
        }
    </script>
</body>
</html>
